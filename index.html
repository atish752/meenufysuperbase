<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF7D00" />
    <meta name="description" content="Meenufy — Your restro's digital staff. QR-based ordering system for restaurant owners." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meenufy" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Theme Blocker Script -->
    <script>
      (function() {
        try {
          var state = JSON.parse(localStorage.getItem('meenufy_state_v1'));
          if (state) {
            var urlParams = new URLSearchParams(window.location.search);
            var isCustomerTab = urlParams.get('view') === 'customer';
            var activeTheme = isCustomerTab ? state.customerTheme : state.adminTheme;
            if (activeTheme === 'light') {
              document.documentElement.classList.add('light-mode');
            }
          }
        } catch(e) {}
      })();
    </script>
    <title>Meenufy — Your restro's digital staff</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
