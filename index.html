<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FF7D00" />
    <meta name="description" content="Meenufy — A hassle-free way. QR-based ordering system for restaurant owners." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Meenufy" />
    <!-- Manifest is switched dynamically below based on the URL path -->
    <link rel="manifest" href="/manifest.json" id="pwa-manifest" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Inline bootstrap script: runs BEFORE React to set manifest and theme correctly -->
    <script>
      (function() {
        try {
          var path = window.location.pathname;
          var isAdminPath = path === '/admin' || path === '/admin/' || path.indexOf('/admin/') === 0;

          // ── 1. Switch manifest dynamically ───────────────────────────────
          var manifestLink = document.getElementById('pwa-manifest');
          if (manifestLink) {
            manifestLink.href = isAdminPath ? '/admin-manifest.json' : '/manifest.json';
          }

          // ── 2. Set apple-mobile-web-app-title ────────────────────────────
          var appleTitleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitleMeta) {
            appleTitleMeta.content = isAdminPath ? 'Meenufy Admin' : 'Meenufy';
          }

          // ── 3. Apply saved theme before React paints (prevents flash) ─────
          var state = JSON.parse(localStorage.getItem('meenufy_state_v1') || '{}');
          var activeTheme = isAdminPath ? state.adminTheme : state.customerTheme;
          if (activeTheme === 'light') {
            document.documentElement.classList.add('light-mode');
          }
        } catch(e) {}
      })();
    </script>
    <title>Meenufy — A hassle-free way</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
